# Pings the deployed Render service every 10 minutes so the free instance
# never hits its 15-minute idle spin-down — donations arrive on a socket the
# server holds open, so a sleeping server means missed donations.
#
# Setup: repo Settings -> Secrets and variables -> Actions -> Variables ->
# add RENDER_URL = https://<your-service>.onrender.com
#
# Note: GitHub disables scheduled workflows after ~60 days without repo
# activity; a push (or re-enabling in the Actions tab) turns it back on.
name: keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          if [ -z "${{ vars.RENDER_URL }}" ]; then
            echo "RENDER_URL repository variable is not set -- skipping."
            exit 0
          fi
          curl -fsS --max-time 30 "${{ vars.RENDER_URL }}/health" && echo " ok"
